<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <title>StandupGhost</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 14px;
      overflow: hidden;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      padding-top: 16px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      display: block;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus { border-color: #555; }

    textarea {
      resize: none;
      height: 90px;
      line-height: 1.5;
    }

    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }

    .btn-row { display: flex; gap: 10px; }

    button {
      flex: 1;
      padding: 11px;
      background: #ffffff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    #cancelBtn  { background: #2a2a2a; color: #e0e0e0; }
    #deliverBtn { background: #1a6b3a; color: #fff; }

    #log {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      font-family: 'SF Mono', 'Menlo', monospace;
      color: #888;
      overflow-y: auto;
      line-height: 1.6;
    }

    .log-line.new { color: #e0e0e0; }
  </style>
</head>
<body>
  <div class="title">StandupGhost</div>

  <div>
    <label>Meet Link</label>
    <input id="meetUrl" type="text" value="https://meet.google.com/afc-byow-wbm" />
  </div>

  <div class="row">
    <div>
      <label>Schedule (optional)</label>
      <input id="scheduleTime" type="time" />
    </div>
  </div>

  <div>
    <label>Standup Script</label>
    <textarea id="standupScript">Hey everyone, I'm Aryan's assistant. He was a bit busy and couldn't join directly — I'm joining on his behalf. Yesterday he finished the auth module and reviewed two PRs. Today he's working on the dashboard redesign. No blockers. Thank you everyone, got to go, bye!</textarea>
  </div>

  <!-- Phase 1: open the meet -->
  <div class="btn-row" id="phase1">
    <button id="openBtn">Open Meet</button>
  </div>

  <!-- Phase 2: deliver or cancel (hidden until meet is open) -->
  <div class="btn-row" id="phase2" style="display:none">
    <button id="deliverBtn">Deliver Now</button>
    <button id="cancelBtn" style="flex:0 0 90px">Cancel</button>
  </div>

  <div id="log"></div>

  <script>
    // Preset schedule to 1 minute from now
    const t = new Date(Date.now() + 60000);
    document.getElementById('scheduleTime').value =
      String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');

    const openBtn    = document.getElementById('openBtn');
    const deliverBtn = document.getElementById('deliverBtn');
    const cancelBtn  = document.getElementById('cancelBtn');
    const logEl      = document.getElementById('log');

    function addLog(msg) {
      const line = document.createElement('div');
      line.className = 'log-line new';
      line.textContent = msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      setTimeout(() => line.classList.remove('new'), 2000);
    }

    function showPhase(n) {
      document.getElementById('phase1').style.display = n === 1 ? 'flex' : 'none';
      document.getElementById('phase2').style.display = n === 2 ? 'flex' : 'none';
    }

    window.electronAPI.onLog(addLog);

    window.electronAPI.onRunDone(() => {
      showPhase(1);
      openBtn.disabled = false;
      openBtn.textContent = 'Open Meet';
    });

    openBtn.addEventListener('click', () => {
      const meetUrl      = document.getElementById('meetUrl').value.trim();
      const standupScript = document.getElementById('standupScript').value.trim();
      const scheduleTime  = document.getElementById('scheduleTime').value;

      if (!meetUrl)       { alert('Enter a Meet link'); return; }
      if (!standupScript) { alert('Enter your standup script'); return; }

      openBtn.disabled = true;
      openBtn.textContent = scheduleTime ? `Scheduled ${scheduleTime}` : 'Opening...';

      window.electronAPI.openMeet({ meetUrl, standupScript, scheduleTime });
    });

    deliverBtn.addEventListener('click', () => {
      deliverBtn.disabled = true;
      deliverBtn.textContent = 'Delivering...';
      window.electronAPI.deliverNow();
    });

    cancelBtn.addEventListener('click', () => {
      window.electronAPI.cancelRun();
      showPhase(1);
      openBtn.disabled = false;
      openBtn.textContent = 'Open Meet';
    });

    window.electronAPI.onMeetOpen(() => {
      showPhase(2);
      deliverBtn.disabled = false;
      deliverBtn.textContent = 'Deliver Now';
    });
  </script>
</body>
</html>
